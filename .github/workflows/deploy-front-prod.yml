name: Deploy prod (ElectroGases Front)

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    outputs:
      owner_lc: ${{ steps.lowercase.outputs.OWNER_LC }}
    steps:
      - uses: actions/checkout@v4

      - name: Lowercase owner
        id: lowercase
        run: echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push front image (prod)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ steps.lowercase.outputs.OWNER_LC }}/electrogases-web:prod-latest
            ghcr.io/${{ steps.lowercase.outputs.OWNER_LC }}/electrogases-web:prod-${{ github.sha }}
          build-args: |
            VITE_URL_API_PROD=${{ secrets.VITE_URL_API_PROD }}
            VITE_INSPECTOR=${{ secrets.VITE_INSPECTOR }}

  deploy:
    name: Remote Deploy via SSH
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Remote deploy (SSH)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            docker network create stack || true
            cd /var/www/proyectos/jecgas-landing-prod
            docker compose -f docker-compose.prod.yml up -d --pull always --force-recreate web
            docker image prune -f
